name: CI / Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Smoke test CLI
        run: |
          node bin/reespec.mjs harnesses
          node bin/reespec.mjs --help || true
          # init in a temp dir and verify skills are installed
          tmpdir=$(mktemp -d)
          cd $tmpdir
          node $GITHUB_WORKSPACE/bin/reespec.mjs init --tools pi,opencode
          test -f .pi/skills/reespec-discover/SKILL.md || (echo "skill not found" && exit 1)
          test -f .opencode/skills/reespec-plan/SKILL.md || (echo "skill not found" && exit 1)
          echo "smoke test passed"

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
