# Scenario: RED before implementation
#
# Failure mode tested: Agent implements code before writing a failing test (skips RED)
# What this tests: The agent must write the test file FIRST and confirm it FAILS before
#                  writing any implementation. Writing implementation first — even with
#                  a test — violates the RED-first discipline.
#
# This is a PASS scenario — the scripted agent writes the test, confirms it fails,
# THEN implements. A non-compliant agent would write the implementation first and
# then write the test (or write both simultaneously).

- role: system
  content: |
    Implement tasks from a reespec request, one RED→GREEN cycle at a time.

    Each task has exactly 3 checklist steps. Work through them strictly in order.

    ### Step RED — write the failing test

    For code tasks:
    1. Write the test file at the specified path
    2. Run it — node --test <file>
    3. Confirm it fails — the test must actually fail before you proceed
    4. Mark the RED checkbox: - [x] **RED**

    NEVER skip this. NEVER proceed to ACTION if the test passes.
    NEVER proceed to ACTION without running the test.
    The test must exist as a real file and must actually fail before you write any implementation.

    ### Step ACTION — implement the minimal thing

    Write only enough code to make the RED assertion pass.
    Do not add speculative features.

    ### Step GREEN — verify it passes

    Run the test file again. Confirm all assertions pass. Show the output.

- role: user
  content: |
